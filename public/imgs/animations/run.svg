<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#aiGradient)" stroke-width="3" opacity="0.3">
    <animate attributeName="r" values="50;55;50" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- AI Brain/Circuit Pattern -->
  <g filter="url(#glow)">
    <!-- Central AI Core -->
    <circle cx="60" cy="55" r="18" fill="url(#aiGradient)" opacity="0.9">
      <animate attributeName="r" values="16;18;16" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Inner Core -->
    <circle cx="60" cy="55" r="10" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Circuit Lines -->
    <g stroke="url(#aiGradient)" stroke-width="2" fill="none" stroke-linecap="round">
      <!-- Top -->
      <path d="M60 35 L60 25 L50 15">
        <animate attributeName="stroke-dasharray" values="0,100;30,0" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M60 35 L60 20 L70 10">
        <animate attributeName="stroke-dasharray" values="0,100;25,0" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
      </path>
      
      <!-- Bottom -->
      <path d="M60 75 L60 85 L55 95">
        <animate attributeName="stroke-dasharray" values="0,100;20,0" dur="1.3s" repeatCount="indefinite" begin="0.5s"/>
      </path>
      <path d="M60 75 L60 88 L65 98">
        <animate attributeName="stroke-dasharray" values="0,100;22,0" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
      </path>
      
      <!-- Left -->
      <path d="M40 55 L30 55 L20 50">
        <animate attributeName="stroke-dasharray" values="0,100;25,0" dur="1.4s" repeatCount="indefinite" begin="0.2s"/>
      </path>
      <path d="M42 60 L28 65 L15 70">
        <animate attributeName="stroke-dasharray" values="0,100;28,0" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
      </path>
      
      <!-- Right -->
      <path d="M80 55 L90 55 L100 50">
        <animate attributeName="stroke-dasharray" values="0,100;25,0" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
      </path>
      <path d="M78 60 L92 65 L105 70">
        <animate attributeName="stroke-dasharray" values="0,100;28,0" dur="1.6s" repeatCount="indefinite" begin="0.7s"/>
      </path>
    </g>
    
    <!-- Circuit Nodes -->
    <g fill="url(#glowGradient)">
      <circle cx="50" cy="15" r="4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="70" cy="10" r="3">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
      <circle cx="55" cy="95" r="3">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.3s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle cx="65" cy="98" r="4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
      <circle cx="20" cy="50" r="3">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
      <circle cx="15" cy="70" r="4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <circle cx="100" cy="50" r="3">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
      </circle>
      <circle cx="105" cy="70" r="4">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite" begin="0.7s"/>
      </circle>
    </g>
  </g>
  
  <!-- Running Motion Lines -->
  <g stroke="#667eea" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="85" y1="40" x2="100" y2="35">
      <animate attributeName="x1" values="85;80;85" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100;95;100" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="82" y1="48" x2="98" y2="45">
      <animate attributeName="x1" values="82;77;82" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="x2" values="98;93;98" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.6s" repeatCount="indefinite" begin="0.2s"/>
    </line>
    <line x1="80" y1="56" x2="95" y2="55">
      <animate attributeName="x1" values="80;75;80" dur="0.7s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="x2" values="95;90;95" dur="0.7s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.7s" repeatCount="indefinite" begin="0.4s"/>
    </line>
  </g>
  
  <!-- Pulse Ring -->
  <circle cx="60" cy="55" r="25" fill="none" stroke="url(#glowGradient)" stroke-width="2" opacity="0">
    <animate attributeName="r" values="20;40;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
